<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Suporte - Saúde++</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { color: #3498db; font-size: 1.5rem; margin-bottom: 30px; border-bottom: 1px solid #3e5871; padding-bottom: 10px; }
        .sidebar nav a { color: #ecf0f1; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; display: block; }
        .sidebar nav a:hover, .sidebar nav a.active { background-color: #3498db; color: white; cursor: pointer; }
        .logout-btn { margin-top: auto; background-color: #e74c3c; padding: 10px; text-align: center; border-radius: 8px; color: white; text-decoration: none; font-weight: bold; }
        
        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        .search-bar { margin-bottom: 20px; width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 1rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table th, table td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        table th { color: #7f8c8d; font-size: 0.9rem; text-transform: uppercase; }
        
        .btn-reset { background-color: #f39c12; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-reset:hover { background-color: #d35400; }
        .hidden { display: none; }
        
        /* Estilos do Chat Admin */
        .chat-admin-container { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: 600px; }
        .chat-sidebar { border-right: 1px solid #eee; overflow-y: auto; }
        .chat-contact { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .chat-contact:hover, .chat-contact.active { background-color: #e8f4fd; }
        .chat-main { display: flex; flex-direction: column; }
        .chat-box { flex-grow: 1; padding: 20px; background: #f9f9f9; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px; border-radius: 10px; font-size: 0.9rem; }
        .msg.user { background: #fff; align-self: flex-start; border: 1px solid #ddd; }
        .msg.support { background: #3498db; color: white; align-self: flex-end; }
        .chat-reply { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-reply input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }

        .user-badge { background-color: #e8f4fd; color: #3498db; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Saúde++ Suporte</h2>
        <nav>
            <a onclick="switchTab('users')" id="tab-users" class="active">Gerenciar Usuários</a>
            <a onclick="switchTab('chats')" id="tab-chats">Mensagens</a>
        </nav>
        <a href="login.html" class="logout-btn" onclick="localStorage.removeItem('currentUser')">Sair do Suporte</a>
    </div>

    <main>
        <div id="users-section">
            <h1>Atendimento ao Cliente</h1>
            <div class="section">
            <p>Utilize esta tela para auxiliar usuários com problemas de acesso ou perda de senha.</p>
            <input type="text" id="user-search" class="search-bar" placeholder="🔍 Buscar usuário por nome ou e-mail..." onkeyup="filterUsers()">
            
            <table id="users-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Telefone</th>
                        <th>Criado em</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="users-list-body">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
        </div>

        <div id="chats-section" class="hidden">
            <h1>Mensagens de Suporte</h1>
            <div class="section chat-admin-container">
                <div class="chat-sidebar" id="chat-contacts">
                    <!-- Lista de emails que enviaram mensagens -->
                </div>
                <div class="chat-main">
                    <div class="chat-box" id="admin-chat-box">
                        <p style="text-align:center; color:#999;">Selecione uma conversa ao lado.</p>
                    </div>
                    <div class="chat-reply hidden" id="admin-reply-area">
                        <input type="text" id="admin-reply-input" placeholder="Digite sua resposta...">
                        <button class="btn-reset" style="background:#3498db;" onclick="sendAdminReply()">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Proteção de Rota: Só permite 'support' ou 'admin'
        const userSession = JSON.parse(localStorage.getItem('currentUser'));
        if (!userSession || (userSession.role !== 'support' && userSession.role !== 'admin')) {
            window.location.href = 'login.html';
        }

        let activeChatEmail = null;
        const API_URL = 'http://localhost:3000/api';

        function switchTab(tab) {
            document.getElementById('users-section').classList.toggle('hidden', tab !== 'users');
            document.getElementById('chats-section').classList.toggle('hidden', tab !== 'chats');
            document.getElementById('tab-users').classList.toggle('active', tab === 'users');
            document.getElementById('tab-chats').classList.toggle('active', tab === 'chats');
            
            if (tab === 'chats') {
                loadChatContacts();
                window.adminInterval = setInterval(refreshCurrentChat, 5000);
            } else {
                clearInterval(window.adminInterval);
            }
        }

        async function loadChatContacts() {
            try {
                const response = await fetch(`${API_URL}/admin/messages`);
                const messages = await response.json();
                
                // Agrupa por e-mail único
                const emails = [...new Set(messages.map(m => m.email))];
                const contactList = document.getElementById('chat-contacts');
                
                contactList.innerHTML = emails.map(email => `
                    <div class="chat-contact ${activeChatEmail === email ? 'active' : ''}" onclick="selectChat('${email}')">
                        <strong>${email}</strong>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function selectChat(email) {
            activeChatEmail = email;
            document.getElementById('admin-reply-area').classList.remove('hidden');
            loadChatContacts(); // Refresh sidebar highlight
            refreshCurrentChat();
        }

        async function refreshCurrentChat() {
            if (!activeChatEmail) return;
            
            try {
                const response = await fetch(`${API_URL}/messages/${activeChatEmail}`);
                const messages = await response.json();
                const box = document.getElementById('admin-chat-box');
                
                box.innerHTML = messages.map(m => `
                    <div class="msg ${m.sender === 'user' ? 'user' : 'support'}">
                        <strong>${m.sender === 'user' ? m.name : 'Suporte'}:</strong><br>
                        ${m.message}
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            } catch (err) { console.error(err); }
        }

        async function sendAdminReply() {
            const input = document.getElementById('admin-reply-input');
            const message = input.value.trim();
            if (!message || !activeChatEmail) return;

            const payload = {
                name: "Suporte Saúde++",
                email: activeChatEmail,
                message: message,
                sender: 'support'
            };

            try {
                await fetch(`${API_URL}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                input.value = '';
                refreshCurrentChat();
            } catch (err) { alert('Erro ao enviar mensagem.'); }
        }

        function initSupportPage() {
            const users = AuthService.getUsers();
            const tbody = document.getElementById('users-list-body');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Nenhum usuário cadastrado no sistema.</td></tr>';
                return;
            }

            renderUsers(users);
        }

        function renderUsers(usersList) {
            const tbody = document.getElementById('users-list-body');
            tbody.innerHTML = usersList.map(user => `
                <tr>
                    <td><strong>${user.name}</strong></td>
                    <td>${user.email}</td>
                    <td>${user.phone || 'N/A'}</td>
                    <td><span class="user-badge">${new Date(user.createdAt).toLocaleDateString('pt-BR')}</span></td>
                    <td>
                        <button class="btn-reset" onclick="handlePasswordReset('${user.email}')">Redefinir Senha</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterUsers() {
            const query = document.getElementById('user-search').value.toLowerCase();
            const allUsers = AuthService.getUsers();
            const filtered = allUsers.filter(u => 
                u.name.toLowerCase().includes(query) || 
                u.email.toLowerCase().includes(query)
            );
            renderUsers(filtered);
        }

        async function handlePasswordReset(email) {
            const newPassword = prompt(`Digite a nova senha para o usuário ${email}:`);
            
            if (newPassword === null) return; // Cancelou
            
            if (newPassword.length < 4) {
                alert("A senha deve ter pelo menos 4 caracteres.");
                return;
            }

            try {
                const allUsers = AuthService.getUsers();
                const user = allUsers.find(u => u.email === email);
                
                if (user) {
                    user.password = newPassword;
                    AuthService.updateUser(user);
                    alert(`Senha de ${user.name} alterada com sucesso!`);
                }
            } catch (error) {
                console.error("Erro ao redefinir senha:", error);
                alert("Ocorreu um erro ao processar a solicitação.");
            }
        }

        // Inicia a página
        document.addEventListener('DOMContentLoaded', initSupportPage);
    </script>
</body>
</html>
